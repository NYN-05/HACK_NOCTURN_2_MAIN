name: Performance Regression

on:
  pull_request:
  workflow_dispatch:

jobs:
  benchmark-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.lock.txt ]; then pip install -r requirements.lock.txt; fi

      - name: Validate benchmark history format
        run: |
          if [ -f evaluation/benchmark_history.json ]; then
            python evaluation/check_regression.py --history-json evaluation/benchmark_history.json
          else
            echo "benchmark_history.json not present; skipping regression check"
          fi
